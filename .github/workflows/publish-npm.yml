  name: Publish to npm

  on:
    release:
      types: [published]

  permissions:
    contents: read

  jobs:
    npm-publish:
      name: Upload release to npm
      runs-on: ubuntu-latest
      environment:
        name: npm
        url: https://www.npmjs.com/package/sprout-social-mcp
      steps:
        - uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            registry-url: 'https://registry.npmjs.org'

        - name: Install dependencies
          working-directory: ./node
          run: npm ci

        - name: Build package
          working-directory: ./node
          run: npm run build

        - name: Publish to npm
          working-directory: ./node
          run: npm publish --access public
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
